<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error": "#ffffff",
                        "secondary": "#42617d",
                        "on-primary-fixed": "#370c19",
                        "on-primary-fixed-variant": "#6c3644",
                        "secondary-fixed": "#cde5ff",
                        "surface-bright": "#fef8fa",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#aacaea",
                        "on-secondary-container": "#43627e",
                        "surface-variant": "#e7e1e3",
                        "outline": "#847376",
                        "surface-container-low": "#f8f2f4",
                        "surface-container": "#f2ecee",
                        "surface-container-high": "#ece7e9",
                        "on-tertiary-fixed": "#06210d",
                        "tertiary-fixed": "#cbebca",
                        "primary": "#874d5b",
                        "surface-container-highest": "#e7e1e3",
                        "on-tertiary-container": "#3f5b42",
                        "on-surface-variant": "#514346",
                        "inverse-primary": "#fcb2c2",
                        "surface-dim": "#ded9db",
                        "on-secondary-fixed-variant": "#294964",
                        "tertiary": "#49654c",
                        "inverse-on-surface": "#f5eff1",
                        "on-tertiary": "#ffffff",
                        "primary-container": "#ffb5c5",
                        "on-surface": "#1d1b1d",
                        "on-primary": "#ffffff",
                        "tertiary-container": "#b2d1b2",
                        "outline-variant": "#d6c2c4",
                        "surface-tint": "#874d5b",
                        "background": "#fef8fa",
                        "primary-fixed": "#ffd9e0",
                        "tertiary-fixed-dim": "#afcfaf",
                        "surface": "#fef8fa",
                        "inverse-surface": "#323031",
                        "on-primary-container": "#7b4351",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#001d32",
                        "error": "#ba1a1a",
                        "secondary-container": "#bddefe",
                        "on-secondary": "#ffffff",
                        "primary-fixed-dim": "#fcb2c2",
                        "on-background": "#1d1b1d",
                        "on-tertiary-fixed-variant": "#324d35",
                        "error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "24px",
                        "gutter": "16px",
                        "xl": "64px",
                        "base": "8px",
                        "xs": "4px",
                        "lg": "40px",
                        "container-margin": "20px",
                        "sm": "12px"
                    },
                    "fontFamily": {
                        "h2": ["Plus Jakarta Sans"],
                        "label-caps": ["Be Vietnam Pro"],
                        "h1": ["Plus Jakarta Sans"],
                        "body-md": ["Be Vietnam Pro"],
                        "body-lg": ["Be Vietnam Pro"]
                    },
                    "fontSize": {
                        "h2": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "h1": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .soft-gradient-bg {
            background: linear-gradient(135deg, #fef8fa 0%, #fff0f3 50%, #f0f7ff 100%);
        }
        .cloud-shape {
            border-radius: 60% 40% 70% 30% / 30% 70% 30% 70%;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background font-body-md text-on-background min-h-screen flex items-center justify-center p-gutter relative overflow-hidden">
<!-- Decorative Soft Pastel Background Elements -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] bg-primary-container/20 cloud-shape blur-3xl"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[70%] h-[70%] bg-secondary-container/20 cloud-shape blur-3xl"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full soft-gradient-bg opacity-50"></div>
</div>
<!-- Auth Card Container -->
<main class="relative z-10 w-full max-w-[440px] flex flex-col items-center">
<!-- Logo Section -->
<div class="mb-lg text-center">
<div class="w-24 h-24 mx-auto mb-md bg-white rounded-xl shadow-lg shadow-primary-container/30 flex items-center justify-center overflow-hidden">
<img alt="Heartline Logo" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA-qO1gWUDwnoT0lMK_wsJNYEN6xD2bUZoN6UaFq0Bl52FuCMR4ZiY2kRYgkQ03BnMLfa4z47kkHCqgsMLFjtmS7A0IjbC9iO6MhK04Jjd7_lRFLIpqJB2HV_nEg6LfyipdL9ugZ2g-L9oX2FHyCay7NuzKtM8lI7N6KX8Sr0_-3ZRym1Jm3gvFuEcn5M5T_WRmdp6FQ5Sg8ok76O-bQKP993PPrUa3mXDonZSYPOl_9ifknfliKwJq36yIQGP2DTvT7sddf3oXebT0"/>
</div>
<h1 class="font-h1 text-h1 text-primary tracking-tight">Heartline</h1>
<p class="font-body-md text-on-surface-variant mt-xs">连接跨越距离的爱</p>
</div>
<!-- Form Section -->
<div class="w-full bg-white/60 backdrop-blur-xl p-md rounded-xl shadow-xl shadow-primary-container/10 border border-white">
<!-- Main Tabs: Login / Register -->
<div class="flex gap-md mb-lg border-b border-surface-variant">
<button class="pb-base border-b-2 border-primary font-h2 text-h2 text-primary transition-all">登录</button>
<button class="pb-base border-b-2 border-transparent font-h2 text-h2 text-outline hover:text-primary transition-all">注册</button>
</div>
<div class="space-y-md">
<!-- Login Method Toggle (SMS / Password) -->
<div class="flex p-1 bg-surface-container rounded-full mb-md">
<button class="flex-1 py-1.5 text-label-caps bg-white rounded-full shadow-sm text-primary font-semibold transition-all">验证码登录</button>
<button class="flex-1 py-1.5 text-label-caps text-outline hover:text-primary transition-all">密码登录</button>
</div>
<!-- Phone Input Field -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-outline px-base">手机号码</label>
<div class="relative flex items-center bg-surface-container-lowest border-2 border-transparent focus-within:border-primary-container focus-within:shadow-[0_0_15px_rgba(255,181,197,0.4)] rounded-lg transition-all overflow-hidden group">
<!-- Flag Selector -->
<div class="flex items-center gap-xs px-sm py-md border-r border-surface-variant hover:bg-surface-container transition-colors cursor-pointer">
<span class="text-2xl">🇨🇳</span>
<span class="font-body-md text-on-surface">+86</span>
<span class="material-symbols-outlined text-[18px] text-outline">expand_more</span>
</div>
<input class="w-full bg-transparent border-none focus:ring-0 font-body-lg text-on-surface px-md py-md placeholder:text-outline-variant" placeholder="请输入您的手机号" type="tel"/>
</div>
</div>
<!-- Password Input (Conditional) -->
<div class="space-y-xs">
<div class="flex justify-between items-center px-base">
<label class="font-label-caps text-label-caps text-outline">验证码</label>
<!-- For Password Login state this would be "Forgot Password?" -->
<button class="text-label-caps text-primary hover:underline font-semibold">获取验证码</button>
</div>
<div class="relative flex items-center bg-surface-container-lowest border-2 border-transparent focus-within:border-primary-container focus-within:shadow-[0_0_15px_rgba(255,181,197,0.4)] rounded-lg transition-all overflow-hidden">
<input class="w-full bg-transparent border-none focus:ring-0 font-body-lg text-on-surface px-md py-md placeholder:text-outline-variant" placeholder="请输入验证码" type="text"/>
</div>
</div>
<!-- Forgot Password Link (Only visible in Password Login Mode) -->
<div class="hidden flex justify-end px-base">
<a class="text-label-caps text-outline hover:text-primary transition-colors" href="#">忘记密码？</a>
</div>
<!-- Action Button -->
<button class="w-full bg-gradient-to-r from-primary-container to-[#ff9eb3] text-on-primary-container font-h2 py-md rounded-lg shadow-lg shadow-primary-container/40 active:scale-[0.98] transition-all flex items-center justify-center gap-sm mt-md">
                    立即登录
                    <span class="material-symbols-outlined font-bold">arrow_forward</span>
</button>
</div>
</div>
<!-- Footer Links -->
<div class="mt-lg text-center space-y-sm">
<p class="font-body-md text-outline">
                还没有账号？ 
                <a class="text-primary font-semibold hover:underline" href="#">立即注册</a>
</p>
<p class="font-body-md text-outline">
                登录即代表您同意 
                <a class="text-primary font-semibold hover:underline" href="#">服务协议</a> 
                和 
                <a class="text-primary font-semibold hover:underline" href="#">隐私政策</a>
</p>
<div class="flex items-center justify-center gap-md pt-sm">
<button class="flex items-center gap-xs font-label-caps text-outline hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[16px]">language</span>
                    简体中文
                </button>
<div class="w-[1px] h-3 bg-surface-variant"></div>
<button class="font-label-caps text-outline hover:text-primary transition-colors">遇到问题？</button>
</div>
</div>
</main>
<!-- Floating Mood Chips for decorative touch -->
<div class="absolute bottom-10 left-10 hidden md:flex items-center gap-sm bg-white/80 backdrop-blur-md px-md py-base rounded-full shadow-sm border border-primary-container/20">
<span class="text-lg">💖</span>
<span class="font-label-caps text-primary">想你啦</span>
</div>
<div class="absolute top-20 right-20 hidden md:flex items-center gap-sm bg-white/80 backdrop-blur-md px-md py-base rounded-full shadow-sm border border-secondary-container/20">
<span class="text-lg">😴</span>
<span class="font-label-caps text-secondary">准备睡觉</span>
</div>
</body></html>
