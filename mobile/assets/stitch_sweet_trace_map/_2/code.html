<!DOCTYPE html>

                    "h1": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}],

      }

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .blur-zone-overlay {
        background: radial-gradient(circle, rgba(255,181,197,0.4) 0%, rgba(255,181,197,0) 70%);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<nav class="fixed top-0 z-[60] w-full bg-stone-50/90 dark:bg-stone-900/90 backdrop-blur-xl rounded-b-[32px] shadow-lg shadow-rose-200/20 dark:shadow-rose-900/10 h-16 flex justify-between items-center px-6">
<div class="flex items-center gap-3 active:scale-[0.97] transition-transform duration-200 ease-out hover:opacity-80 cursor-pointer">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center overflow-hidden">
<img alt="Partner Avatar" data-alt="A soft-focus portrait of a smiling person in a warm, sunlit room. The aesthetic is gentle and intimate, featuring a palette of soft pinks and warm neutrals to match the Heartline brand identity. The lighting is ethereal and high-key, creating a sense of safety and emotional connection." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAF7znCIwskueZ1H0Z1y76iqoN5Uf52rk-oecmu9ogEAni8WpWecj512YvyAmweOwIIEYPJSlWzDGsYe-6mvCYDHUntB3wrlPXO9JlHOuiaMF3djDnb_iirFPRE2QJ8Trzyh1A7t7fMUAS8JNnqAlQecEU9y9MkZUhf1hp10sJXaRX9zxyW8bG01AkP_yrrfk3-BK9if8V9O6L_o1ClB3_hOC1XkhjxED-eBw0nqrL2YBryqN90TJP9F0aairuaGZad0pPtKwgk2vav"/>
</div>
</div>
<h1 class="text-2xl font-black italic text-rose-400 dark:text-rose-300 tracking-tighter font-['Plus_Jakarta_Sans']">Heartline</h1>
<button class="text-rose-300 dark:text-rose-200 active:scale-[0.97] transition-transform duration-200 ease-out hover:opacity-80">
<span class="material-symbols-outlined" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
</button>
</nav>
<main class="pt-24 pb-32 px-gutter max-w-md mx-auto space-y-lg">
<!-- Header Section -->
<header class="space-y-xs px-2">
<h2 class="font-h1 text-h1 text-primary">隐私与共享</h2>
<p class="text-on-surface-variant font-body-md opacity-70">守护你与伴侣的亲密空间</p>
</header>
<!-- Location Sharing Modes -->
<section class="space-y-md">
<div class="flex items-center justify-between px-2">
<span class="font-label-caps text-label-caps text-secondary uppercase tracking-widest">共享状态</span>
<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-tertiary-container/30 text-on-tertiary-container text-[12px] font-bold">
<span class="w-2 h-2 rounded-full bg-tertiary animate-pulse"></span>
                    实时同步中
                </span>
</div>
<div class="grid grid-cols-2 gap-base">
<!-- Mode: Always -->
<button class="flex flex-col items-center justify-center p-md gap-sm rounded-lg bg-primary-container text-on-primary-container shadow-lg shadow-rose-200/40 ring-2 ring-primary transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-3xl" data-icon="all_inclusive">all_inclusive</span>
<span class="font-bold text-sm">始终共享</span>
</button>
<!-- Mode: 1 Hour -->
<button class="flex flex-col items-center justify-center p-md gap-sm rounded-lg bg-surface-container hover:bg-surface-container-high text-on-surface-variant transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-3xl" data-icon="timer">timer</span>
<span class="font-bold text-sm">1 小时</span>
</button>
<!-- Mode: Front-only -->
<button class="flex flex-col items-center justify-center p-md gap-sm rounded-lg bg-surface-container hover:bg-surface-container-high text-on-surface-variant transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-3xl" data-icon="visibility">visibility</span>
<span class="font-bold text-sm">仅前台</span>
</button>
<!-- Mode: Pause -->
<button class="flex flex-col items-center justify-center p-md gap-sm rounded-lg bg-surface-container hover:bg-surface-container-high text-on-surface-variant transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-3xl" data-icon="pause_circle">pause_circle</span>
<span class="font-bold text-sm">暂停</span>
</button>
</div>
</section>
<!-- Precision Toggle Card -->
<section class="bg-surface-container-low rounded-xl p-md shadow-lg shadow-rose-100/10 border border-outline-variant/30">
<div class="flex items-center justify-between mb-md">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 rounded-full bg-secondary-container/50 flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="location_searching">location_searching</span>
</div>
<div>
<h3 class="font-h2 text-body-md font-bold text-on-surface">位置精准度</h3>
<p class="text-[12px] text-on-surface-variant opacity-60">模糊处理敏感区域</p>
</div>
</div>
<div class="flex bg-surface-container-highest p-1 rounded-full gap-1">
<button class="px-4 py-1.5 rounded-full text-[12px] font-bold bg-white shadow-sm text-primary">精准</button>
<button class="px-4 py-1.5 rounded-full text-[12px] font-bold text-on-surface-variant">模糊</button>
</div>
</div>
<!-- Map Preview -->
<div class="relative w-full h-48 rounded-lg overflow-hidden bg-surface-variant">
<img alt="Blurred map preview" class="w-full h-full object-cover filter saturate-[0.8]" data-alt="A minimalist overhead view of a modern city map with soft, pastel-toned streets and green spaces. In the center, a large, translucent pink circular overlay creates a soft blur effect, representing a privacy zone. The lighting is bright and clean, following a light-mode aesthetic with a gentle, romantic feel consistent with the Heartline app." data-location="Shanghai" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCrZ-R0pzeIPN_s28wLVjkb-Idq0kxi7PaQzlNl1cfTGBSyAmz5kplFb-z_9AIU7b5Afs32d7ygRVoo5KkfZm82eaHH6VpLA0OC5GZu9oSOdfkeEs6cKOZHPf9l7tTocIuJJdP56hePgkmn87AXV7Lbvl3q6xqDM-vhatGnUImC60weBUApR-DewI0nRwMZH8QljpapxwWOGojmhca4YG3MCNmhEw7YF99bPnpK9MAQJnb26fFL8pL2IYkXB_PsXpB6AltXRbWBeJny"/>
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-32 h-32 rounded-full blur-zone-overlay flex items-center justify-center border-2 border-dashed border-rose-200/50">
<div class="bg-white/90 backdrop-blur-md p-2 rounded-full shadow-lg">
<span class="material-symbols-outlined text-rose-400" data-icon="home" style="font-variation-settings: 'FILL' 1;">home</span>
</div>
</div>
</div>
<div class="absolute bottom-3 left-3 bg-white/80 backdrop-blur px-3 py-1 rounded-full text-[10px] font-bold tracking-wider text-rose-500 border border-rose-100">
                    家庭模糊区域已开启
                </div>
</div>
</section>
<!-- Settings List -->
<section class="space-y-sm">
<h3 class="font-label-caps text-label-caps text-secondary uppercase px-2">共享偏好</h3>
<div class="bg-surface-container-lowest rounded-xl overflow-hidden border border-outline-variant/20 shadow-sm">
<!-- List Item 1 -->
<div class="flex items-center justify-between p-md border-b border-outline-variant/10 active:bg-surface-container-low transition-colors">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 rounded-lg bg-tertiary-container/20 flex items-center justify-center text-tertiary">
<span class="material-symbols-outlined" data-icon="distance">distance</span>
</div>
<span class="font-bold text-on-surface">共享距离差</span>
</div>
<div class="w-12 h-6 bg-primary-container rounded-full relative">
<div class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full shadow-sm"></div>
</div>
</div>
<!-- List Item 2 -->
<div class="flex items-center justify-between p-md border-b border-outline-variant/10 active:bg-surface-container-low transition-colors">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 rounded-lg bg-secondary-container/20 flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="battery_charging_full">battery_charging_full</span>
</div>
<span class="font-bold text-on-surface">共享电量状态</span>
</div>
<div class="w-12 h-6 bg-primary-container rounded-full relative">
<div class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full shadow-sm"></div>
</div>
</div>
<!-- List Item 3 -->
<div class="flex items-center justify-between p-md active:bg-surface-container-low transition-colors">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 rounded-lg bg-on-error-container/10 flex items-center justify-center text-error">
<span class="material-symbols-outlined" data-icon="privacy_tip">privacy_tip</span>
</div>
<span class="font-bold text-on-surface">隐身模式计划</span>
</div>
<span class="material-symbols-outlined text-outline" data-icon="chevron_right">chevron_right</span>
</div>
</div>
</section>
<!-- Danger Zone -->
<section class="px-2">
<button class="w-full py-md text-error font-bold flex items-center justify-center gap-sm rounded-xl border-2 border-error-container bg-error-container/10 active:scale-[0.98] transition-transform">
<span class="material-symbols-outlined" data-icon="no_accounts">no_accounts</span>
                停止所有共享
            </button>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full rounded-t-[40px] z-50 bg-white/80 dark:bg-stone-950/80 backdrop-blur-2xl shadow-[0_-15px_40px_rgba(255,181,197,0.15)] border-t border-rose-100/50 dark:border-stone-800">
<div class="flex justify-around items-center w-full max-w-md mx-auto px-4 pb-8 pt-4">
<!-- Map -->
<button class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-600 px-6 py-2 scale-100 transition-all duration-300 hover:text-rose-300 dark:hover:text-rose-400 active:scale-[0.92]">
<span class="material-symbols-outlined mb-1" data-icon="map">map</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-bold uppercase tracking-widest">Map</span>
</button>
<!-- Chat -->
<button class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-600 px-6 py-2 scale-100 transition-all duration-300 hover:text-rose-300 dark:hover:text-rose-400 active:scale-[0.92]">
<span class="material-symbols-outlined mb-1" data-icon="chat_bubble">chat_bubble</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-bold uppercase tracking-widest">Chat</span>
</button>
<!-- Calendar -->
<button class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-600 px-6 py-2 scale-100 transition-all duration-300 hover:text-rose-300 dark:hover:text-rose-400 active:scale-[0.92]">
<span class="material-symbols-outlined mb-1" data-icon="calendar_today">calendar_today</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-bold uppercase tracking-widest">Calendar</span>
</button>
<!-- Profile (Active) -->
<button class="flex flex-col items-center justify-center bg-rose-50 dark:bg-rose-900/20 text-rose-500 dark:text-rose-200 rounded-[24px] px-6 py-2 scale-105 transition-all duration-300 active:scale-[0.92]">
<span class="material-symbols-outlined mb-1" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-bold uppercase tracking-widest">Profile</span>
</button>
</div>
</nav>
</body></html>
