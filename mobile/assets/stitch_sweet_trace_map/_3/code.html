<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pulse-glow {
            animation: pulse-ring 3s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.7); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 0.3; }
            100% { transform: scale(0.7); opacity: 0.8; }
        }
        .bouncy-tap:active { transform: scale(0.92); transition: transform 0.1s cubic-bezier(0.34, 1.56, 0.64, 1); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background font-body-md text-on-background selection:bg-primary-container selection:text-on-primary-container overflow-hidden">
<!-- Top Navigation Bar -->
<header class="fixed top-0 left-0 right-0 z-[60] bg-stone-50/90 dark:bg-stone-900/90 backdrop-blur-xl shadow-lg shadow-rose-200/20 dark:shadow-rose-900/10 flex justify-between items-center w-full px-6 py-4 h-16 rounded-b-[32px]">
<div class="flex items-center gap-3 active:scale-[0.97] transition-transform duration-200 ease-out cursor-pointer">
<div class="w-10 h-10 rounded-full border-2 border-primary-container overflow-hidden">
<img class="w-full h-full object-cover" data-alt="A warm and friendly profile photograph of a young man with a kind expression, set against a soft-focus interior background. The lighting is golden and natural, emphasizing a sense of comfort and intimacy. The image follows a soft-minimalist aesthetic with gentle pastel tones that harmonize with a rose and stone color palette." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCLtvcwCHqMEJiNijdnWjlqeGwQhVaLtNS1epuvdFWBAdI_sR-H0Va5stK-bsiuJ8s82ELs_jZ_pHw9oiQenxG7a1q1vgqMLg-4eZiBuEtb3xUzeVpWIypq6zZURN_M3mvC1Eq9KY46w0FpyaDLuBc-7CPCQEeEAk_Mcsy2vmVDnlhM4WGVSg9LsuodsB2ERrVrtPeK4NHVMIrWKpKIVLYKW5ZUrceV7WHqawgHXdikjqwVo8vY4luSB8e5tYYdmpq5SDEf1FR_uqyM"/>
</div>
<span class="text-2xl font-black italic text-rose-400 dark:text-rose-300 tracking-tighter font-['Plus_Jakarta_Sans']">Heartline</span>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-low text-rose-300 dark:text-rose-200 hover:opacity-80 transition-opacity active:scale-[0.97]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">favorite</span>
</button>
</header>
<!-- Main Map Canvas -->
<main class="relative h-screen w-full pt-16 overflow-hidden">
<!-- Interactive Map Container -->
<div class="absolute inset-0 bg-secondary-fixed-dim">
<div class="w-full h-full grayscale-[20%] opacity-80" data-location="Beijing" style="">
<img class="w-full h-full object-cover" data-alt="A high-angle, stylized digital map of a modern metropolitan city with soft, pastel-colored streets and blocks. The aesthetic is clean and minimal, using a palette of soft pinks, gentle blues, and warm whites. The lighting is diffused, giving the entire cityscape a dreamlike, intimate atmosphere suitable for a long-distance relationship application." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCseH7lxL-ABn3XdJAAZ3vpoH5Er3lC0mUtUW-ZLXdR7nPDhrHqmjMhe1GWEkxNbK_6V20j1BsVFZGM50jvV0bphOXq93L0EUjQG23B5mIr78b_6xH2ky5vyUxzzkVTtgxP6ZgbsUuz3c-wkpxZ70tbgDh6_hekAubfbCpW1k40nVcyITZ7SELFArgqLC-QnGN9JJFVcZN-YElaPe16vnM61FUhGLCQ-cZEGpjPLhewDpn7NqLt9AvkFO6nzZ2TYsQgt54tC9wlXMHC"/>
</div>
<!-- Map Overlay: Connections -->
<svg class="absolute inset-0 w-full h-full pointer-events-none opacity-30">
<path d="M 100,200 Q 400,300 800,100" fill="none" stroke="#FFB5C5" stroke-dasharray="8,8" stroke-width="4"></path>
</svg>
<!-- Partner Avatar on Map -->
<div class="absolute top-[45%] left-[60%] -translate-x-1/2 -translate-y-1/2 group">
<div class="relative">
<div class="absolute -inset-4 bg-primary-container/30 rounded-full pulse-glow"></div>
<div class="relative w-16 h-16 rounded-full border-4 border-white shadow-xl overflow-hidden active:scale-95 transition-transform">
<img class="w-full h-full object-cover" data-alt="Close-up portrait of a young woman with a joyful smile, her face softly lit by the late afternoon sun. The background is a soft blur of urban greenery. The visual style is warm, high-key, and intimate, capturing a sense of genuine connection and happiness in a soft-minimalist framework." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDpNp35oIy66oMJVd80hOm0qUW2ULNYZLNaqBKj1FPWnbetd1L-u_EHHkqP-rzsUeMUEOPum5PrYKNWo593dhCrTz6EUdV0Wdc5d_KH6FmcYWLs219KlQNTu-Iem45lnK_mWXTnbcKrhOBCRqiTWTYrRqIbi9d2pWcu6XGYK-6CpeFeIROHsoBxKWjxpo-wd1gTkoDZfzLqrkmO1kCh-9DVblB-6clebt51k2v7C37mMaDGnsx0SyzBtUv9W2XZ6BZbjzBz14PQm1zJ"/>
</div>
<!-- Status Badge -->
<div class="absolute -bottom-2 -right-2 bg-white/90 backdrop-blur-md rounded-full px-2 py-1 flex items-center gap-1 shadow-sm border border-rose-100">
<span class="material-symbols-outlined text-[12px] text-error">battery_20</span>
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-tighter">刚刚</span>
</div>
</div>
</div>
</div>
<!-- Floating Status Card -->
<div class="absolute top-20 left-4 right-4 z-40">
<div class="bg-white/80 backdrop-blur-2xl rounded-xl p-5 shadow-[0_15px_40px_rgba(255,181,197,0.15)] border border-rose-100/50">
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1">
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase">相距距离</p>
<p class="font-h2 text-h2 text-primary">1314km</p>
</div>
<div class="space-y-1 text-right">
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase">实时天气</p>
<p class="text-body-md font-semibold text-secondary">🌧️ 伦敦 / ☀️ 北京</p>
</div>
<div class="col-span-2 pt-3 border-t border-rose-100 flex justify-between items-center">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-rose-400">event</span>
<span class="font-body-md font-medium text-on-surface">距离下次见面</span>
</div>
<div class="px-3 py-1 bg-primary-container/20 rounded-full">
<span class="font-h2 text-primary">12</span> <span class="text-primary-container font-bold">天</span>
</div>
</div>
</div>
</div>
</div>
<!-- Quick Action Floating Buttons -->
<div class="absolute bottom-32 right-6 flex flex-col gap-4 z-40">

<span class="material-symbols-outlined">directions_walk</span>
</button>
<button class="bouncy-tap w-14 h-14 bg-white/90 backdrop-blur-md text-primary rounded-full shadow-lg flex items-center justify-center border border-rose-100">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">favorite</span>
</button>
<button class="bouncy-tap w-14 h-14 bg-error-container text-error rounded-full shadow-lg flex items-center justify-center">
<span class="material-symbols-outlined font-bold">sos</span>
</button>
</div>
<!-- Chinese Quick Action Pills -->
<div class="absolute bottom-32 left-6 flex flex-col gap-2 z-40 max-w-[120px]">
<div class="bg-primary/90 text-white backdrop-blur-md px-4 py-2 rounded-full text-sm font-bold shadow-sm bouncy-tap text-center">我在路上了</div>
<div class="bg-white/90 text-primary backdrop-blur-md px-4 py-2 rounded-full text-sm font-bold shadow-sm bouncy-tap text-center border border-rose-100">我想你了</div>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 w-full rounded-t-[40px] z-50 bg-white/80 dark:bg-stone-950/80 backdrop-blur-2xl border-t border-rose-100/50 dark:border-stone-800 shadow-[0_-15px_40px_rgba(255,181,197,0.15)]">
<div class="flex justify-around items-center w-full max-w-md mx-auto px-4 pb-8 pt-4">
<!-- Map (Active) -->
<button class="flex flex-col items-center justify-center bg-rose-50 dark:bg-rose-900/20 text-rose-500 dark:text-rose-200 rounded-[24px] px-6 py-2 scale-105 transition-all duration-300 active:scale-[0.92]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-bold uppercase tracking-widest mt-1">Map</span>
</button>
<!-- Chat -->
<button class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-600 px-6 py-2 scale-100 transition-all duration-300 hover:text-rose-300 dark:hover:text-rose-400 active:scale-[0.92]">
<span class="material-symbols-outlined">chat_bubble</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-bold uppercase tracking-widest mt-1">Chat</span>
</button>
<!-- Calendar -->
<button class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-600 px-6 py-2 scale-100 transition-all duration-300 hover:text-rose-300 dark:hover:text-rose-400 active:scale-[0.92]">
<span class="material-symbols-outlined">calendar_today</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-bold uppercase tracking-widest mt-1">Calendar</span>
</button>
<!-- Profile -->
<button class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-600 px-6 py-2 scale-100 transition-all duration-300 hover:text-rose-300 dark:hover:text-rose-400 active:scale-[0.92]">
<span class="material-symbols-outlined">person</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-bold uppercase tracking-widest mt-1">Profile</span>
</button>
</div>
