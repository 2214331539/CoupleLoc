<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,800&amp;family=Be+Vietnam+Pro:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-error": "#ffffff",
                    "secondary": "#42617d",
                    "on-primary-fixed": "#370c19",
                    "on-primary-fixed-variant": "#6c3644",
                    "secondary-fixed": "#cde5ff",
                    "surface-bright": "#fef8fa",
                    "on-error-container": "#93000a",
                    "secondary-fixed-dim": "#aacaea",
                    "on-secondary-container": "#43627e",
                    "surface-variant": "#e7e1e3",
                    "outline": "#847376",
                    "surface-container-low": "#f8f2f4",
                    "surface-container": "#f2ecee",
                    "surface-container-high": "#ece7e9",
                    "on-tertiary-fixed": "#06210d",
                    "tertiary-fixed": "#cbebca",
                    "primary": "#874d5b",
                    "surface-container-highest": "#e7e1e3",
                    "on-tertiary-container": "#3f5b42",
                    "on-surface-variant": "#514346",
                    "inverse-primary": "#fcb2c2",
                    "surface-dim": "#ded9db",
                    "on-secondary-fixed-variant": "#294964",
                    "tertiary": "#49654c",
                    "inverse-on-surface": "#f5eff1",
                    "on-tertiary": "#ffffff",
                    "primary-container": "#ffb5c5",
                    "on-surface": "#1d1b1d",
                    "on-primary": "#ffffff",
                    "tertiary-container": "#b2d1b2",
                    "outline-variant": "#d6c2c4",
                    "surface-tint": "#874d5b",
                    "background": "#fef8fa",
                    "primary-fixed": "#ffd9e0",
                    "tertiary-fixed-dim": "#afcfaf",
                    "surface": "#fef8fa",
                    "inverse-surface": "#323031",
                    "on-primary-container": "#7b4351",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-fixed": "#001d32",
                    "error": "#ba1a1a",
                    "secondary-container": "#bddefe",
                    "on-secondary": "#ffffff",
                    "primary-fixed-dim": "#fcb2c2",
                    "on-background": "#1d1b1d",
                    "on-tertiary-fixed-variant": "#324d35",
                    "error-container": "#ffdad6"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "md": "24px",
                    "gutter": "16px",
                    "xl": "64px",
                    "base": "8px",
                    "xs": "4px",
                    "lg": "40px",
                    "container-margin": "20px",
                    "sm": "12px"
            },
            "fontFamily": {
                    "h2": ["Plus Jakarta Sans"],
                    "label-caps": ["Be Vietnam Pro"],
                    "h1": ["Plus Jakarta Sans"],
                    "body-md": ["Be Vietnam Pro"],
                    "body-lg": ["Be Vietnam Pro"]
            },
            "fontSize": {
                    "h2": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                    "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "h1": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bouncy-hover:hover {
            transform: scale(1.02);
        }
        .bouncy-active:active {
            transform: scale(0.96);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen font-body-md">
<!-- Top Navigation -->
<header class="fixed top-0 left-0 right-0 z-50 bg-stone-50/90 backdrop-blur-xl rounded-b-[32px] shadow-lg shadow-rose-200/20 px-6 h-16 flex justify-between items-center">
<div class="w-10 h-10 rounded-full bg-primary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</div>
<h1 class="text-rose-400 font-['Plus_Jakarta_Sans'] text-2xl font-black italic tracking-tighter">Heartline</h1>
<div class="w-10 h-10 flex items-center justify-center">
<span class="material-symbols-outlined text-rose-300">favorite</span>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-md mx-auto flex flex-col items-center">
<!-- Instruction Section -->
<div class="text-center mb-lg">
<h2 class="font-h1 text-h1 text-primary mb-xs">开启你们的距离</h2>
<p class="font-body-md text-on-surface-variant">邀请另一半加入，同步你们的每一个心跳</p>
</div>
<!-- Main Pairing Card (Glassmorphism / Soft Minimal) -->
<div class="w-full bg-white/60 backdrop-blur-md rounded-xl p-base border border-white/40 shadow-[0_20px_50px_rgba(255,181,197,0.15)] flex flex-col items-center">
<!-- QR Code Section -->
<div class="relative group mt-md mb-md">
<div class="absolute -inset-4 bg-gradient-to-tr from-primary-container to-secondary-container opacity-20 blur-2xl rounded-full group-hover:opacity-30 transition-opacity"></div>
<div class="relative bg-white p-6 rounded-lg shadow-sm border border-primary-container/20">
<img alt="Pairing QR Code" class="w-[180px] h-[180px]" data-alt="A large, high-resolution QR code stylized with rounded edges and a soft aesthetic. The QR code is rendered in a deep dusty rose color, set against a pristine white background with a subtle shadow. Surrounding the QR code is a gentle, glowing halo of soft pink and pastel blue light, reflecting a warm, modern light-mode UI design. The entire composition feels intimate, safe, and technologically advanced for a romantic application." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBkszg-6Y0-8_so3xGg495mh6xhyWpVULiYSWG8y4Yf-OHhuxr6OxjiX45v1YS_Cs5g5WSRlZs028HfwSxOGG7VtOP3DQvBj6VwI4pBYvH01JrmvmyWw4Mdpxf4dTo9Ln8MwIIWF6Wjf0ryDnKDDTubtXEPMyw0O1xJDJv5d1B-dbUV8MVsy5LaNo5vPtHCISTceRS0_D3nKZNTJh4cqVkS4gsFiQqsyJunR05Uu_h793kgZw3QEDPkjSWfn9Ct0eWpHz4Owi4HWb4n"/>
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-lg border border-primary-container/20">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
</div>
</div>
</div>
<!-- Invitation Code Section -->
<div class="w-full bg-surface-container rounded-lg p-md mb-md flex flex-col items-center">
<span class="font-label-caps text-label-caps text-on-surface-variant mb-xs">专属配对码</span>
<div class="flex gap-2 mb-sm">
<span class="text-h1 font-h1 text-primary tracking-widest">LOVE2U</span>
</div>
<!-- Action Buttons -->
<div class="flex gap-sm w-full">
<button class="flex-1 h-12 bg-white rounded-full flex items-center justify-center gap-xs font-label-caps text-primary border border-primary-container/30 shadow-sm bouncy-hover bouncy-active transition-all">
<span class="material-symbols-outlined text-[20px]">content_copy</span>
<span>复制</span>
</button>
<button class="flex-1 h-12 bg-primary-container text-on-primary-container rounded-full flex items-center justify-center gap-xs font-label-caps shadow-lg shadow-primary-container/30 bouncy-hover bouncy-active transition-all">
<span class="material-symbols-outlined text-[20px]">share</span>
<span>分享</span>
</button>
</div>
</div>
<!-- Status Section -->
<div class="w-full py-sm px-md flex items-center justify-center gap-sm">
<div class="relative flex items-center justify-center">
<div class="absolute w-3 h-3 bg-secondary rounded-full animate-ping opacity-75"></div>
<div class="relative w-2 h-2 bg-secondary rounded-full"></div>
</div>
<p class="font-body-md text-secondary font-semibold">正在等待另一半加入...</p>
</div>
</div>
<!-- Secondary Options -->
<div class="mt-lg w-full flex flex-col gap-sm">
<button class="w-full py-md px-6 bg-surface-container-low border border-outline-variant/30 rounded-lg flex items-center justify-between bouncy-hover transition-all">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 bg-tertiary-container/30 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary">qr_code_scanner</span>
</div>
<span class="font-body-md font-semibold text-on-surface">输入另一半的码</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</button>
<!-- Mood Tip -->
<div class="p-md rounded-xl bg-primary-fixed/20 border border-primary-fixed flex gap-sm items-start">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<p class="text-[14px] leading-relaxed text-on-primary-fixed-variant">
<strong class="block mb-xs text-primary">小贴士</strong>
                    让你的另一半扫描二维码或输入上面的代码，你们就能立即开始共享时刻。
                </p>
</div>
</div>
</main>
<!-- Bottom Navigation (Shell Mapping: Map, Chat, Calendar, Profile) -->
<nav class="fixed bottom-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-2xl rounded-t-[40px] shadow-[0_-15px_40px_rgba(255,181,197,0.15)] border-t border-rose-100/50">
<div class="flex justify-around items-center w-full max-w-md mx-auto px-4 pb-8 pt-4">
<a class="flex flex-col items-center justify-center text-stone-400 px-6 py-2 transition-all duration-300" href="#">
<span class="material-symbols-outlined mb-1">map</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-bold uppercase tracking-widest">Map</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-400 px-6 py-2 transition-all duration-300" href="#">
<span class="material-symbols-outlined mb-1">chat_bubble</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-bold uppercase tracking-widest">Chat</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-400 px-6 py-2 transition-all duration-300" href="#">
<span class="material-symbols-outlined mb-1">calendar_today</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-bold uppercase tracking-widest">Calendar</span>
</a>
<!-- Logic: User is in Pairing/Profile Setup, so Profile is Active -->
<a class="flex flex-col items-center justify-center bg-rose-50 text-rose-500 rounded-[24px] px-6 py-2 scale-105 transition-all duration-300" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-bold uppercase tracking-widest">Profile</span>
</a>
</div>
</nav>
<!-- Background Decorative Elements -->
<div class="fixed top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary-container/10 rounded-full blur-[100px] -z-10"></div>
<div class="fixed bottom-[-5%] left-[-5%] w-[400px] h-[400px] bg-secondary-container/10 rounded-full blur-[80px] -z-10"></div>
</body></html>
